# config/nodes.yaml
# ---------------------------------------------------------------------------
# axon-graph node registry
#
# Each entry defines one knowledge-graph node and its associated miner.
# Fields:
#   id          : canonical node identifier (used in KnowledgeQuery / NarrativeHop)
#   domain      : knowledge domain tag (used for corpus routing)
#   persona     : default narrative persona for hops departing this node
#   description : human-readable summary (not sent on-chain)
#   adjacency   : list of node ids this node has outgoing edges to
#   miner:
#     type      : "domain" | "narrative" | "both"
#     hotkey    : ss58 address of the registered miner (fill in after registration)
#     axon_ip   : miner's public IP (fill in after deployment)
#     axon_port : miner's axon port
#
# Adjacency is directional. To make an edge bidirectional add it on both sides.
# Edge weights are initialised to 1.0 by scripts/seed_graph.py and evolve
# over time via traversal feedback.
# ---------------------------------------------------------------------------

nodes:

