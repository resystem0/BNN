apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: axon-graph
  labels:
    app: redis
    app.kubernetes.io/part-of: axon-graph
spec:
  # ClusterIP (headless for StatefulSet DNS — redis-0.redis.axon-graph.svc)
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
