apiVersion: v1
kind: Service
metadata:
  name: ipfs
  namespace: axon-graph
  labels:
    app: ipfs
    app.kubernetes.io/part-of: axon-graph
spec:
  type: ClusterIP
  selector:
    app: ipfs
  ports:
    - name: api
      port: 5001
      targetPort: 5001
      protocol: TCP
    - name: gateway
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# Separate Service for swarm connectivity — NodePort exposes port 4001 to
# enable IPFS peer discovery across the internet.
# The NodePort value is left as auto-assigned; pin it (e.g. 30401) if your
# firewall rules reference a fixed port.
apiVersion: v1
kind: Service
metadata:
  name: ipfs-swarm
  namespace: axon-graph
  labels:
    app: ipfs
    app.kubernetes.io/part-of: axon-graph
spec:
  type: NodePort
  selector:
    app: ipfs
  ports:
    - name: swarm-tcp
      port: 4001
      targetPort: 4001
      protocol: TCP
      # nodePort: 30401  # Uncomment to pin the NodePort value
    - name: swarm-udp
      port: 4001
      targetPort: 4001
      protocol: UDP
      # nodePort: 30401
