apiVersion: v1
kind: Secret
metadata:
  name: axon-secrets
  namespace: axon-graph
  labels:
    app.kubernetes.io/part-of: axon-graph
type: Opaque
stringData:
  # ---------------------------------------------------------------------------
  # IMPORTANT: Replace ALL values below with real secrets before deploying.
  # Never commit real keys to version control.
  # Recommended: manage this Secret via external-secrets-operator or Vault.
  # ---------------------------------------------------------------------------

  # Bittensor wallet coldkey mnemonic (used by validator and miners)
  AXON_WALLET_COLDKEY_MNEMONIC: "REPLACE_WITH_COLDKEY_MNEMONIC"

  # Bittensor validator hotkey SS58 address
  # Each validator replica loads its key via the app using POD_NAME to select
  # the correct key file from a mounted wallet directory. See validator
  # deployment comment for the per-replica key loading pattern.
  AXON_VALIDATOR_HOTKEY_SS58: "REPLACE_WITH_VALIDATOR_HOTKEY_SS58"

  # Validator hotkey mnemonic (for weight commit signing)
  AXON_VALIDATOR_HOTKEY_MNEMONIC: "REPLACE_WITH_VALIDATOR_HOTKEY_MNEMONIC"

  # JWT secret for gateway session tokens
  AXON_JWT_SECRET: "REPLACE_WITH_JWT_SECRET_MIN_32_CHARS"

  # Optional: Bittensor subtensor endpoint override (e.g. for private node)
  # AXON_SUBTENSOR_ENDPOINT: "wss://your-subtensor:9944"
