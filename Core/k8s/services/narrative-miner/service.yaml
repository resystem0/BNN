apiVersion: v1
kind: Service
metadata:
  name: narrative-miner
  namespace: axon-graph
  labels:
    app: narrative-miner
    app.kubernetes.io/part-of: axon-graph
spec:
  type: ClusterIP
  selector:
    app: narrative-miner
  ports:
    - name: axon
      port: 8092
      targetPort: 8092
      protocol: TCP
