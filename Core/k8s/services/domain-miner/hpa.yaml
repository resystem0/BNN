apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: domain-miner
  namespace: axon-graph
  labels:
    app: domain-miner
    app.kubernetes.io/part-of: axon-graph
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: domain-miner
  minReplicas: 4
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # Conservative scale-down: wait 5 minutes before removing pods to avoid
      # thrashing during burst query windows (subnet_config: VALIDATOR_SAMPLE_SIZE)
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
