apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: axon-graph-alerts
  namespace: axon-graph
  labels:
    app: prometheus
    app.kubernetes.io/part-of: axon-graph
    # Label required by the Prometheus Operator to pick up this rule file.
    # Adjust to match your PrometheusRule selector if using the Operator.
    prometheus: axon-graph
    role: alert-rules
spec:
  groups:
    - name: axon-graph.validator
      interval: 30s
      rules:
        # -------------------------------------------------------------------
        # Alert 1: ValidatorOffline
        # Fires when any validator pod has been unreachable for 2 minutes.
        # This indicates the scoring loop has stopped; weight commits will
        # cease after VALIDATOR_EPOCH_LENGTH_BLOCKS (~72 min) expire.
        # -------------------------------------------------------------------
        - alert: ValidatorOffline
          expr: up{job="validator"} == 0
          for: 2m
          labels:
            severity: critical
            team: axon-graph
            subnet: "42"
          annotations:
            summary: "Validator pod {{ $labels.pod }} is offline"
            description: >
              The validator pod {{ $labels.pod }} in namespace
              {{ $labels.namespace }} has been unreachable for more than 2
              minutes. The Bittensor weight-commit scoring loop is degraded.
              Check pod logs: kubectl logs -n axon-graph {{ $labels.pod }}
            runbook_url: "https://docs.axon-graph.example.com/runbooks/validator-offline"

    - name: axon-graph.miners
      interval: 30s
      rules:
        # -------------------------------------------------------------------
        # Alert 2: MinerHighTimeoutRate
        # Fires when the 5-minute rolling timeout fraction for any miner
        # exceeds 15% (INCUBATION_MAX_TIMEOUT_FRACTION from subnet_config).
        # Sustained high timeout rate causes incubation failure for new nodes
        # and damages the miner's rolling score.
        # -------------------------------------------------------------------
        - alert: MinerHighTimeoutRate
          expr: >
            rate(axon_miner_timeouts_total[5m])
            /
            rate(axon_miner_requests_total[5m])
            > 0.15
          for: 5m
          labels:
            severity: warning
            team: axon-graph
            subnet: "42"
          annotations:
            summary: "High timeout rate on miner {{ $labels.pod }}"
            description: >
              Miner pod {{ $labels.pod }} has a timeout rate of
              {{ $value | humanizePercentage }} over the last 5 minutes,
              exceeding the 15% incubation threshold
              (INCUBATION_MAX_TIMEOUT_FRACTION=0.15).
              VALIDATOR_TIMEOUT_KNOWLEDGE={{ "3.0" }}s,
              VALIDATOR_TIMEOUT_HOP={{ "5.0" }}s.
              Investigate CPU/memory pressure or upstream dependency latency.
            runbook_url: "https://docs.axon-graph.example.com/runbooks/miner-timeout"

    - name: axon-graph.graph-store
      interval: 30s
      rules:
        # -------------------------------------------------------------------
        # Alert 3: GraphStoreWriteLatencyHigh
        # Fires when p95 graph write latency exceeds 500ms for 5 minutes.
        # KuZuDB writes occur on every edge weight update (traversal, decay,
        # reinforcement). High latency blocks the scoring loop and causes
        # session progression stalls visible to the player UI.
        # -------------------------------------------------------------------
        - alert: GraphStoreWriteLatencyHigh
          expr: >
            histogram_quantile(
              0.95,
              rate(axon_graph_write_duration_seconds_bucket[5m])
            ) > 0.5
          for: 5m
          labels:
            severity: warning
            team: axon-graph
            subnet: "42"
          annotations:
            summary: "Graph store p95 write latency exceeds 500ms"
            description: >
              The 95th-percentile KuZuDB write duration has been above 500ms
              for the last 5 minutes (current value: {{ $value | humanizeDuration }}).
              This will delay edge weight updates and may cause validator
              scoring timeouts. Check kuzu pod health and PVC IOPS utilisation.
              kubectl top pod -n axon-graph -l app=kuzu
            runbook_url: "https://docs.axon-graph.example.com/runbooks/graph-write-latency"
